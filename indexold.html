<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>KR Quant Trading Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f3;
  --color-background-tertiary: #eeece6;
  --color-background-info: #e6f1fb;
  --color-background-success: #eaf3de;
  --color-background-warning: #faeeda;
  --color-background-danger: #fcebeb;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #6b6b68;
  --color-text-tertiary: #9e9d99;
  --color-text-info: #185fa5;
  --color-text-success: #3b6d11;
  --color-text-warning: #854f0b;
  --color-text-danger: #a32d2d;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --color-border-primary: rgba(0,0,0,0.32);
  --color-border-info: rgba(24,95,165,0.4);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
@media(prefers-color-scheme: dark){
  :root {
    --color-background-primary: #1e1e1c;
    --color-background-secondary: #2a2a28;
    --color-background-tertiary: #242422;
    --color-background-info: #0c3254;
    --color-background-success: #173404;
    --color-background-warning: #412402;
    --color-background-danger: #501313;
    --color-text-primary: #f0ede8;
    --color-text-secondary: #9e9d99;
    --color-text-tertiary: #6b6b68;
    --color-text-info: #85b7eb;
    --color-text-success: #97c459;
    --color-text-warning: #ef9f27;
    --color-text-danger: #f09595;
    --color-border-tertiary: rgba(255,255,255,0.10);
    --color-border-secondary: rgba(255,255,255,0.20);
    --color-border-primary: rgba(255,255,255,0.30);
    --color-border-info: rgba(133,183,235,0.4);
  }
}
body {
  font-family: var(--font-sans);
  background: var(--color-background-tertiary);
  color: var(--color-text-primary);
  min-height: 100vh;
  padding: 1.5rem;
}
.db-wrap { max-width: 1100px; margin: 0 auto; }
.db-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
.db-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); letter-spacing: 0.08em; }
.db-subtitle { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.db-time { font-size: 11px; color: var(--color-text-secondary); background: var(--color-background-secondary); padding: 4px 10px; border-radius: 4px; border: 0.5px solid var(--color-border-tertiary); }
.db-refresh { font-size: 11px; color: var(--color-text-info); background: var(--color-background-info); padding: 4px 10px; border-radius: 4px; border: 0.5px solid var(--color-border-tertiary); cursor: pointer; }
.session-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; }
.sess-tab { font-size: 11px; padding: 5px 12px; border-radius: 4px; border: 0.5px solid var(--color-border-tertiary); cursor: pointer; color: var(--color-text-secondary); background: transparent; }
.sess-tab.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); font-weight: 500; }
.stock-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
@media(max-width:700px){ .stock-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width:440px){ .stock-grid { grid-template-columns: 1fr; } }
.stock-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; cursor: pointer; transition: border-color 0.15s; position: relative; overflow: hidden; }
.stock-card:hover { border-color: var(--color-border-secondary); }
.stock-card.selected { border-color: var(--color-border-info); border-width: 1.5px; }
.stock-card.buy-signal::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #1D9E75; }
.stock-card.sell-signal::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #E24B4A; }
.stock-card.watch-signal::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #BA7517; }
.stock-card.hold-signal::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #5F5E5A; }
.sc-ticker { font-size: 10px; color: var(--color-text-secondary); letter-spacing: 0.05em; margin-bottom: 2px; }
.sc-name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; line-height: 1.3; }
.sc-price { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.sc-change { font-size: 11px; margin-left: 6px; }
.sc-change.pos { color: #1D9E75; }
.sc-change.neg { color: #E24B4A; }
.sc-signal-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.sc-signal-badge { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 3px; letter-spacing: 0.04em; }
.badge-buy { background: #E1F5EE; color: #0F6E56; }
.badge-sell { background: #FCEBEB; color: #A32D2D; }
.badge-watch { background: #FAEEDA; color: #854F0B; }
.badge-hold { background: #F1EFE8; color: #444441; }
.sc-pnl { font-size: 11px; font-weight: 500; }
.sc-pnl.pos { color: #1D9E75; }
.sc-pnl.neg { color: #E24B4A; }
.sc-pnl.none { color: var(--color-text-secondary); }
.mini-chart { width: 100%; height: 36px; margin-top: 8px; }
.detail-panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 20px; margin-bottom: 1.5rem; }
.detail-panel.hidden { display: none; }
.dp-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 0.5px solid var(--color-border-tertiary); padding-bottom: 8px; flex-wrap: wrap; }
.dp-tab { font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; color: var(--color-text-secondary); border: none; background: transparent; }
.dp-tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
.dp-content { display: none; }
.dp-content.active { display: block; }
.dp-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.dp-stock-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.dp-price-block { text-align: right; }
.dp-price { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.metrics-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 16px; }
@media(max-width:600px){ .metrics-grid { grid-template-columns: repeat(2,1fr); } }
.metric-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.metric-label { font-size: 10px; color: var(--color-text-secondary); letter-spacing: 0.04em; margin-bottom: 4px; }
.metric-val { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.metric-sub { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; }
.indicators-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 16px; }
.indicators-table th { font-size: 10px; color: var(--color-text-secondary); font-weight: 400; text-align: left; padding: 4px 8px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.indicators-table td { padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); vertical-align: middle; }
.indicators-table tr:last-child td { border-bottom: none; }
.ind-bar-wrap { width: 80px; height: 6px; background: var(--color-background-secondary); border-radius: 3px; display: inline-block; vertical-align: middle; margin-left: 6px; }
.ind-bar { height: 100%; border-radius: 3px; }
.bar-bull { background: #1D9E75; }
.bar-bear { background: #E24B4A; }
.bar-neutral { background: #888780; }
.signal-verdict { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 14px; margin-bottom: 16px; }
.sv-label { font-size: 10px; color: var(--color-text-secondary); letter-spacing: 0.05em; margin-bottom: 6px; }
.sv-action { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
.sv-action.buy { color: #1D9E75; }
.sv-action.sell { color: #E24B4A; }
.sv-action.watch { color: #BA7517; }
.sv-action.hold { color: #5F5E5A; }
.sv-reason { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
.sv-levels { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.sv-level-item { font-size: 11px; }
.sv-level-label { color: var(--color-text-secondary); }
.sv-level-val { font-weight: 500; color: var(--color-text-primary); margin-left: 4px; }
.sv-level-val.danger { color: #E24B4A; }
.sv-level-val.safe { color: #1D9E75; }
.news-list { list-style: none; }
.news-item { padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.news-item:last-child { border-bottom: none; }
.news-date { font-size: 10px; color: var(--color-text-secondary); margin-bottom: 3px; }
.news-title { font-size: 12px; color: var(--color-text-primary); line-height: 1.4; margin-bottom: 3px; }
.news-impact { font-size: 10px; padding: 2px 6px; border-radius: 3px; display: inline-block; }
.impact-pos { background: #E1F5EE; color: #0F6E56; }
.impact-neg { background: #FCEBEB; color: #A32D2D; }
.impact-neu { background: #F1EFE8; color: #444441; }
.eps-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.eps-table th { font-size: 10px; color: var(--color-text-secondary); font-weight: 400; text-align: right; padding: 4px 8px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.eps-table th:first-child { text-align: left; }
.eps-table td { padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); text-align: right; }
.eps-table td:first-child { text-align: left; color: var(--color-text-secondary); }
.eps-table tr:last-child td { border-bottom: none; }
.eps-up { color: #1D9E75; }
.eps-down { color: #E24B4A; }
.pnl-chart-wrap { height: 160px; position: relative; margin-bottom: 12px; }
.pnl-entry-label { font-size: 11px; color: var(--color-text-secondary); text-align: center; margin-top: 4px; }
.close-btn { float: right; font-size: 11px; cursor: pointer; color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); background: transparent; border-radius: 4px; padding: 3px 8px; }
.section-label { font-size: 10px; color: var(--color-text-secondary); letter-spacing: 0.08em; margin-bottom: 8px; font-weight: 500; }
</style>
</head>

<div class="db-wrap">
  <div class="db-header">
    <div>
      <div class="db-title">KR QUANT TRADING DASHBOARD</div>
      <div class="db-subtitle">Hyundai Motor · LG Energy · Doosan Enerbility · KB Financial · Hanwha Aerospace · SK Hynix · Rainbow Robotics</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <span class="db-time" id="cur-time">--:--:--</span>
      <span class="db-refresh" onclick="refreshAll()">새로고침</span>
    </div>
  </div>
 
  <div class="session-tabs">
    <button class="sess-tab active" id="tab-am" onclick="setSession('AM')">오전 세션 (08:10)</button>
    <button class="sess-tab" id="tab-pm" onclick="setSession('PM')">오후 세션 (15:00)</button>
  </div>
 
  <div class="section-label">종목 현황 — 클릭하면 상세 분석</div>
  <div class="stock-grid" id="stock-grid"></div>
 
  <div class="detail-panel hidden" id="detail-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="section-label" style="margin:0;" id="dp-ticker-label">상세 분석</div>
      <button class="close-btn" onclick="closeDetail()">닫기</button>
    </div>
    <div class="dp-tabs">
      <button class="dp-tab active" onclick="switchTab('overview')">종합 판단</button>
      <button class="dp-tab" onclick="switchTab('indicators')">기술 지표</button>
      <button class="dp-tab" onclick="switchTab('consensus')">실적 컨센서스</button>
      <button class="dp-tab" onclick="switchTab('news')">뉴스 요약</button>
      <button class="dp-tab" onclick="switchTab('pnl')">수익률 추적</button>
    </div>
    <div class="dp-content active" id="tab-overview">
      <div class="dp-header">
        <div>
          <div class="dp-stock-name" id="dp-name">-</div>
          <div style="font-size:11px;color:var(--color-text-secondary);" id="dp-sector">-</div>
        </div>
        <div class="dp-price-block">
          <div class="dp-price" id="dp-price">-</div>
          <div style="font-size:12px;" id="dp-change-block">-</div>
        </div>
      </div>
      <div class="metrics-grid" id="dp-metrics"></div>
      <div class="signal-verdict" id="dp-verdict"></div>
      <div class="section-label">핵심 지지/저항 레벨</div>
      <div id="dp-levels-bar" style="margin-bottom:16px;"></div>
    </div>
    <div class="dp-content" id="tab-indicators">
      <div class="section-label" style="margin-top:4px;">기술적 지표 현황 및 설명</div>
      <table class="indicators-table" id="dp-indicators-table"></table>
    </div>
    <div class="dp-content" id="tab-consensus">
      <div class="section-label" style="margin-top:4px;">실적 컨센서스 및 변동치</div>
      <table class="eps-table" id="dp-eps-table"></table>
      <div style="height:180px;position:relative;margin-top:16px;"><canvas id="consensus-chart"></canvas></div>
    </div>
    <div class="dp-content" id="tab-news">
      <div class="section-label" style="margin-top:4px;">최근 주요 뉴스 요약</div>
      <ul class="news-list" id="dp-news-list"></ul>
    </div>
    <div class="dp-content" id="tab-pnl">
      <div class="section-label" style="margin-top:4px;">매수 진입 이후 수익률 추적</div>
      <div class="pnl-chart-wrap"><canvas id="pnl-chart"></canvas></div>
      <div class="pnl-entry-label" id="pnl-entry-label">-</div>
    </div>
  </div>
</div>

let selectedIdx = -1;
let pnlChartInst = null;
let consChartInst = null;
 
function updateTime(){
  const now = new Date();
  document.getElementById('cur-time').textContent = now.toLocaleTimeString('ko-KR',{hour12:false});
}
setInterval(updateTime,1000);
updateTime();
 
function setSession(s){
  document.getElementById('tab-am').classList.toggle('active', s==='AM');
  document.getElementById('tab-pm').classList.toggle('active', s==='PM');
}
 
function refreshAll(){
  renderGrid();
  if(selectedIdx>=0) renderDetail(selectedIdx);
}
 
function signalClass(s){
  if(s==='buy') return 'buy-signal';
  if(s==='sell') return 'sell-signal';
  if(s==='watch') return 'watch-signal';
  return 'hold-signal';
}
 
function pnlPct(stock){
  if(!stock.entryPrice) return null;
  return ((stock.price - stock.entryPrice)/stock.entryPrice*100).toFixed(1);
}
 
function renderGrid(){
  const grid = document.getElementById('stock-grid');
  grid.innerHTML = '';
  STOCKS.forEach((st,i)=>{
    const pnl = pnlPct(st);
    const chgClass = st.change>=0 ? 'pos':'neg';
    const chgSign = st.change>=0?'+':'';
    const pnlClass = pnl===null?'none':(parseFloat(pnl)>=0?'pos':'neg');
    const pnlSign = pnl===null?'':(parseFloat(pnl)>=0?'+':'');
    const selClass = selectedIdx===i ? ' selected':'';
    const div = document.createElement('div');
    div.className = `stock-card ${signalClass(st.signal)}${selClass}`;
    div.onclick = ()=>selectStock(i);
    let badgeCls = 'badge-hold';
    if(st.signal==='buy') badgeCls='badge-buy';
    else if(st.signal==='sell') badgeCls='badge-sell';
    else if(st.signal==='watch') badgeCls='badge-watch';
    const prices = st.pnlData.prices;
    const hasChart = prices && prices.length>=2;
    div.innerHTML = `
      <div class="sc-ticker">${st.ticker} · ${st.sector}</div>
      <div class="sc-name">${st.name}</div>
      <div style="display:flex;align-items:baseline;gap:4px;">
        <span class="sc-price">${st.price.toLocaleString()}</span>
        <span class="sc-change ${chgClass}">${chgSign}${st.change}%</span>
      </div>
      <div class="sc-signal-row">
        <span class="sc-signal-badge ${badgeCls}">${st.signalLabel}</span>
        <span class="sc-pnl ${pnlClass}">${pnl!==null?pnlSign+pnl+'%':'—'}</span>
      </div>
      ${hasChart?`<canvas class="mini-chart" id="spark-${i}" height="36"></canvas>`:'<div style="height:36px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--color-text-secondary);margin-top:8px;">진입 대기</div>'}
    `;
    grid.appendChild(div);
  });
  STOCKS.forEach((st,i)=>{
    const prices = st.pnlData.prices;
    if(!prices||prices.length<2) return;
    const canvas = document.getElementById('spark-'+i);
    if(!canvas) return;
    const isPos = prices[prices.length-1]>=prices[0];
    new Chart(canvas,{
      type:'line',
      data:{labels:st.pnlData.dates,datasets:[{data:prices,borderColor:isPos?'#1D9E75':'#E24B4A',borderWidth:1.5,pointRadius:0,tension:0.4,fill:false}]},
      options:{responsive:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}
    });
  });
}
 
function selectStock(i){
  selectedIdx = i;
  renderGrid();
  renderDetail(i);
  document.getElementById('detail-panel').classList.remove('hidden');
  document.getElementById('detail-panel').scrollIntoView({behavior:'smooth',block:'start'});
}
 
function closeDetail(){
  selectedIdx = -1;
  renderGrid();
  document.getElementById('detail-panel').classList.add('hidden');
}
 
function switchTab(tab){
  const tabs=['overview','indicators','consensus','news','pnl'];
  document.querySelectorAll('.dp-tab').forEach((t,ti)=>t.classList.toggle('active', tabs[ti]===tab));
  document.querySelectorAll('.dp-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='consensus') renderConsensusChart();
  if(tab==='pnl') renderPnlChart();
}
 
function renderDetail(i){
  const st = STOCKS[i];
  document.getElementById('dp-ticker-label').textContent = `${st.name} (${st.ticker})`;
  document.getElementById('dp-name').textContent = st.name;
  document.getElementById('dp-sector').textContent = st.sector;
  document.getElementById('dp-price').textContent = st.price.toLocaleString()+'원';
  const chgSign = st.change>=0?'+':'';
  const chgColor = st.change>=0?'#1D9E75':'#E24B4A';
  document.getElementById('dp-change-block').innerHTML = `<span style="color:${chgColor};font-weight:500;">${chgSign}${st.change}%</span> <span style="color:var(--color-text-secondary);">당일</span>`;
  const mg = document.getElementById('dp-metrics');
  mg.innerHTML = st.metrics.map(m=>`<div class="metric-card"><div class="metric-label">${m.label}</div><div class="metric-val">${m.val}</div>${m.sub?`<div class="metric-sub">${m.sub}</div>`:''}</div>`).join('');
  const actionColors = {매수:'buy',매도:'sell',관망:'watch',보유:'hold',매수추적:'watch',손절:'sell',익절:'hold'};
  const ac = actionColors[st.action]||'hold';
  const pnl = pnlPct(st);
  const pnlDisplay = pnl!==null?`<span style="color:${parseFloat(pnl)>=0?'#1D9E75':'#E24B4A'};font-weight:500;"> (현재 수익률: ${parseFloat(pnl)>=0?'+':''}${pnl}%)</span>`:'';
  document.getElementById('dp-verdict').innerHTML = `
    <div class="sv-label">최종 트레이딩 판단</div>
    <div class="sv-action ${ac}">${st.action}${pnlDisplay}</div>
    <div class="sv-reason">${st.verdict}</div>
    <div class="sv-levels">
      <div class="sv-level-item"><span class="sv-level-label">손절:</span><span class="sv-level-val danger">${(st.entryPrice?Math.round(st.entryPrice - 2.5*st.atr).toLocaleString():st.support[st.support.length-1].toLocaleString())}원</span></div>
      <div class="sv-level-item"><span class="sv-level-label">1차저항:</span><span class="sv-level-val safe">${st.resist[0].toLocaleString()}원</span></div>
      <div class="sv-level-item"><span class="sv-level-label">기준선:</span><span class="sv-level-val">${st.kijun.toLocaleString()}원</span></div>
    </div>`;
  const allLevels = [...st.support,...st.resist,st.price];
  const minL = Math.min(...allLevels)*0.98, maxL = Math.max(...allLevels)*1.02;
  const pct = v=>((v-minL)/(maxL-minL)*100).toFixed(1);
  document.getElementById('dp-levels-bar').innerHTML = `
    <div style="position:relative;height:32px;background:var(--color-background-secondary);border-radius:6px;overflow:visible;margin-bottom:24px;">
      ${st.support.map(v=>`<div style="position:absolute;left:${pct(v)}%;top:0;bottom:0;width:1.5px;background:#E24B4A;opacity:0.7;"></div><div style="position:absolute;left:${pct(v)}%;top:34px;font-size:9px;color:#A32D2D;transform:translateX(-50%);">${v.toLocaleString()}</div>`).join('')}
      ${st.resist.map(v=>`<div style="position:absolute;left:${pct(v)}%;top:0;bottom:0;width:1.5px;background:#1D9E75;opacity:0.7;"></div><div style="position:absolute;left:${pct(v)}%;top:34px;font-size:9px;color:#0F6E56;transform:translateX(-50%);">${v.toLocaleString()}</div>`).join('')}
      <div style="position:absolute;left:${pct(st.price)}%;top:0;bottom:0;width:2.5px;background:#185FA5;z-index:2;"></div>
      <div style="position:absolute;left:${pct(st.price)}%;top:-18px;font-size:9px;color:#185FA5;transform:translateX(-50%);font-weight:500;">현재가</div>
    </div>`;
  const tbl = document.getElementById('dp-indicators-table');
  tbl.innerHTML = `<tr><th>지표</th><th>현재값</th><th>신호 강도</th><th>설명</th></tr>` +
    st.indicators.map(ind=>{
      const barColor = ind.signal==='bull'?'bar-bull':ind.signal==='bear'?'bar-bear':'bar-neutral';
      return `<tr><td style="font-weight:500;">${ind.name}</td><td>${ind.val}</td><td><span class="ind-bar-wrap"><span class="ind-bar ${barColor}" style="width:${ind.score}%;"></span></span></td><td style="color:var(--color-text-secondary);font-size:11px;">${ind.desc}</td></tr>`;
    }).join('');
  const et = document.getElementById('dp-eps-table');
  et.innerHTML = `<tr><th>연도</th><th>매출</th><th>영업이익</th><th>EPS변동</th></tr>` +
    st.consensus.map((r,ri)=>{
      const isUp = r.eps.includes('+');
      const isDown = r.eps.includes('-');
      const epsCls = isUp?'eps-up':isDown?'eps-down':'';
      return `<tr ${ri===0?'style="opacity:0.7;"':''}><td>${r.year}</td><td>${r.sales}</td><td>${r.op}</td><td class="${epsCls}">${r.eps}</td></tr>`;
    }).join('');
  document.getElementById('dp-news-list').innerHTML = st.news.map(n=>`
    <li class="news-item">
      <div class="news-date">${n.date}</div>
      <div class="news-title">${n.title}</div>
      <span class="news-impact ${n.impact==='pos'?'impact-pos':n.impact==='neg'?'impact-neg':'impact-neu'}">${n.impact==='pos'?'긍정':n.impact==='neg'?'부정':'중립'}</span>
    </li>`).join('');
  if(pnlChartInst){pnlChartInst.destroy();pnlChartInst=null;}
  if(consChartInst){consChartInst.destroy();consChartInst=null;}
}
 
function renderConsensusChart(){
  if(!STOCKS[selectedIdx]) return;
  const st = STOCKS[selectedIdx];
  if(consChartInst) consChartInst.destroy();
  consChartInst = new Chart(document.getElementById('consensus-chart'),{
    type:'bar',
    data:{labels:st.epsData.labels,datasets:[{label:'영업이익(조원)',data:st.epsData.vals,backgroundColor:st.epsData.vals.map(v=>v>=0?'rgba(29,158,117,0.7)':'rgba(226,75,74,0.7)'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y.toFixed(2)} 조원`}}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{callback:v=>v+'조',font:{size:10}}}}}
  });
}
 
function renderPnlChart(){
  if(!STOCKS[selectedIdx]) return;
  const st = STOCKS[selectedIdx];
  if(pnlChartInst) pnlChartInst.destroy();
  const prices = st.pnlData.prices;
  const dates = st.pnlData.dates;
  if(!prices||prices.length<1||!st.entryPrice){
    document.getElementById('pnl-entry-label').textContent = '매수 진입 대기 중 — 진입 신호 발생 시 추적 시작';
    return;
  }
  const pctData = prices.map(p=>parseFloat(((p-st.entryPrice)/st.entryPrice*100).toFixed(2)));
  const latestPct = pctData[pctData.length-1];
  const lineColor = latestPct>=0?'#1D9E75':'#E24B4A';
  pnlChartInst = new Chart(document.getElementById('pnl-chart'),{
    type:'line',
    data:{labels:dates,datasets:[
      {label:'수익률(%)',data:pctData,borderColor:lineColor,borderWidth:2,backgroundColor:latestPct>=0?'rgba(29,158,117,0.08)':'rgba(226,75,74,0.08)',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:lineColor},
      {label:'손익분기',data:dates.map(()=>0),borderColor:'rgba(136,135,128,0.4)',borderWidth:1,borderDash:[4,4],pointRadius:0}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y>0?'+':''}${c.parsed.y.toFixed(2)}%`}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{callback:v=>v+'%',font:{size:10}}}}}
  });
  document.getElementById('pnl-entry-label').textContent = `매수 진입: ${st.entryDate} @ ${st.entryPrice.toLocaleString()}원 | 현재 수익률: ${latestPct>=0?'+':''}${latestPct}%`;
}
 
renderGrid();
</script>
</body>
</html>
