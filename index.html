<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KR Quant Trading Dashboard — 14종목</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0d0d0f;--bg1:#141416;--bg2:#1a1a1d;--bg3:#222226;
  --bd:#2a2a2e;--bd2:#38383e;
  --tx0:#f0eee8;--tx1:#a8a69f;--tx2:#6a6864;
  --green:#1fa870;--green2:#0d6644;--greenbg:rgba(31,168,112,0.10);
  --red:#e04545;--red2:#8a2b2b;--redbg:rgba(224,69,69,0.10);
  --amber:#d4820f;--amberbg:rgba(212,130,15,0.10);
  --blue:#3a82d4;--bluebg:rgba(58,130,212,0.10);
  --gray:#5a5a60;--graybg:rgba(90,90,96,0.12);
  --r4:4px;--r8:8px;--r12:12px;
}
body{background:var(--bg0);color:var(--tx0);font-family:'SF Mono','Fira Mono',monospace;min-height:100vh;padding:0}
 
/* HEADER */
.hdr{padding:18px 24px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;background:rgba(13,13,15,0.96);backdrop-filter:blur(8px);z-index:100}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo{font-size:11px;font-weight:600;letter-spacing:0.18em;color:var(--tx0)}
.logo span{color:var(--green)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
.hdr-time{font-size:11px;color:var(--tx2);letter-spacing:0.06em}
.sess-btns{display:flex;gap:4px}
.sb{font-size:10px;padding:4px 10px;border-radius:var(--r4);border:1px solid var(--bd2);background:transparent;color:var(--tx2);cursor:pointer;letter-spacing:0.04em}
.sb.active{background:var(--greenbg);border-color:var(--green2);color:var(--green)}
.refresh-btn{font-size:10px;padding:4px 10px;border-radius:var(--r4);border:1px solid var(--bd2);background:transparent;color:var(--tx1);cursor:pointer;letter-spacing:0.04em}
.refresh-btn:hover{border-color:var(--green2);color:var(--green)}
 
/* FILTER BAR */
.filter-bar{padding:10px 24px;border-bottom:1px solid var(--bd);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fb-label{font-size:10px;color:var(--tx2);letter-spacing:0.06em;margin-right:4px}
.fb-btn{font-size:10px;padding:3px 10px;border-radius:var(--r4);border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer}
.fb-btn.active{background:var(--bg3);color:var(--tx0);border-color:var(--bd2)}
.fb-btn.f-buy.active{background:var(--greenbg);border-color:var(--green2);color:var(--green)}
.fb-btn.f-sell.active{background:var(--redbg);border-color:var(--red2);color:var(--red)}
.fb-btn.f-watch.active{background:var(--amberbg);border-color:var(--amber);color:var(--amber)}
 
/* SUMMARY STRIP */
.summary-strip{padding:10px 24px;border-bottom:1px solid var(--bd);display:flex;gap:20px;flex-wrap:wrap}
.ss-item{display:flex;flex-direction:column;gap:2px}
.ss-label{font-size:9px;color:var(--tx2);letter-spacing:0.07em}
.ss-val{font-size:13px;font-weight:600;letter-spacing:0.02em}
.ss-val.g{color:var(--green)}.ss-val.r{color:var(--red)}.ss-val.a{color:var(--amber)}
 
/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 120px)}
@media(max-width:900px){.main{grid-template-columns:1fr}}
 
/* GRID PANEL */
.grid-panel{padding:16px 24px;border-right:1px solid var(--bd);overflow-y:auto}
.gp-label{font-size:9px;color:var(--tx2);letter-spacing:0.10em;margin-bottom:10px}
.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
 
/* STOCK CARD */
.sc{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r8);padding:12px;cursor:pointer;transition:border-color 0.12s,background 0.12s;position:relative;overflow:hidden}
.sc:hover{border-color:var(--bd2);background:var(--bg2)}
.sc.sel{border-color:var(--blue);background:var(--bg2)}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px}
.sc.sig-buy::before{background:var(--green)}
.sc.sig-sell::before{background:var(--red)}
.sc.sig-watch::before{background:var(--amber)}
.sc.sig-hold::before{background:var(--gray)}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.sc-info .sc-code{font-size:9px;color:var(--tx2);letter-spacing:0.06em;margin-bottom:1px}
.sc-info .sc-name{font-size:12px;font-weight:600;color:var(--tx0);line-height:1.25}
.sc-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:0.04em;white-space:nowrap}
.bg-buy{background:var(--greenbg);color:var(--green);border:1px solid var(--green2)}
.bg-sell{background:var(--redbg);color:var(--red);border:1px solid var(--red2)}
.bg-watch{background:var(--amberbg);color:var(--amber);border:1px solid #6b4108}
.bg-hold{background:var(--graybg);color:#888;border:1px solid #444}
.bg-track{background:var(--bluebg);color:var(--blue);border:1px solid #1e4d8a}
.sc-price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
.sc-price{font-size:16px;font-weight:600;letter-spacing:-0.01em}
.sc-chg{font-size:11px;font-weight:500}
.sc-chg.pos{color:var(--green)}.sc-chg.neg{color:var(--red)}
.sc-bottom{display:flex;justify-content:space-between;align-items:center}
.sc-sector{font-size:9px;color:var(--tx2)}
.sc-pnl{font-size:11px;font-weight:600}
.sc-pnl.pos{color:var(--green)}.sc-pnl.neg{color:var(--red)}.sc-pnl.na{color:var(--tx2)}
.sc-spark{width:100%;height:28px;margin-top:6px}
 
/* DETAIL PANEL */
.detail-panel{background:var(--bg1);overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.detail-panel.empty{display:flex;align-items:center;justify-content:center}
.dp-placeholder{text-align:center;color:var(--tx2);font-size:11px;line-height:2}
.dp-inner{padding:0}
.dp-hdr{padding:14px 16px 0;border-bottom:1px solid var(--bd)}
.dp-close{float:right;font-size:10px;color:var(--tx2);cursor:pointer;border:1px solid var(--bd);background:transparent;border-radius:3px;padding:2px 7px;margin-top:2px}
.dp-title{font-size:14px;font-weight:600;color:var(--tx0);margin-bottom:2px}
.dp-sub{font-size:10px;color:var(--tx2);margin-bottom:10px}
.dp-tabs{display:flex;gap:2px;padding:8px 16px 0;border-bottom:1px solid var(--bd)}
.dt{font-size:10px;padding:5px 10px;border-radius:var(--r4) var(--r4) 0 0;cursor:pointer;color:var(--tx2);background:transparent;border:none;border-bottom:2px solid transparent;letter-spacing:0.04em}
.dt.active{color:var(--tx0);border-bottom-color:var(--green)}
.dp-body{padding:14px 16px}
.dp-section{margin-bottom:14px}
.dps-label{font-size:9px;color:var(--tx2);letter-spacing:0.08em;margin-bottom:6px}
 
/* VERDICT */
.verdict-box{border:1px solid var(--bd2);border-radius:var(--r8);padding:12px;margin-bottom:12px}
.vb-action{font-size:16px;font-weight:700;margin-bottom:4px}
.vb-action.buy{color:var(--green)}.vb-action.sell{color:var(--red)}.vb-action.watch{color:var(--amber)}.vb-action.hold{color:var(--gray)}
.vb-reason{font-size:11px;color:var(--tx1);line-height:1.6}
.vb-levels{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.vbl{font-size:10px}.vbl-l{color:var(--tx2)}.vbl-v{font-weight:600;margin-left:3px}
.vbl-v.r{color:var(--red)}.vbl-v.g{color:var(--green)}
 
/* METRICS */
.dp-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.dm{background:var(--bg2);border-radius:var(--r4);padding:8px 10px}
.dm-l{font-size:9px;color:var(--tx2);letter-spacing:0.04em;margin-bottom:3px}
.dm-v{font-size:13px;font-weight:600;color:var(--tx0)}
.dm-s{font-size:9px;color:var(--tx2);margin-top:1px}
 
/* INDICATORS TABLE */
.ind-tbl{width:100%;border-collapse:collapse;font-size:11px}
.ind-tbl th{font-size:9px;color:var(--tx2);text-align:left;padding:3px 6px 5px;border-bottom:1px solid var(--bd);letter-spacing:0.05em;font-weight:400}
.ind-tbl td{padding:5px 6px;border-bottom:1px solid var(--bd);vertical-align:middle;color:var(--tx0)}
.ind-tbl tr:last-child td{border-bottom:none}
.bar-w{width:60px;height:4px;background:var(--bg3);border-radius:2px;display:inline-block;vertical-align:middle;margin-left:4px}
.bar-f{height:100%;border-radius:2px}
.bf-g{background:var(--green)}.bf-r{background:var(--red)}.bf-n{background:var(--gray)}
 
/* NEWS */
.news-item{padding:8px 0;border-bottom:1px solid var(--bd)}
.news-item:last-child{border-bottom:none}
.ni-date{font-size:9px;color:var(--tx2);margin-bottom:2px}
.ni-title{font-size:11px;color:var(--tx0);line-height:1.4;margin-bottom:3px}
.ni-tag{font-size:9px;padding:1px 5px;border-radius:2px}
.t-pos{background:var(--greenbg);color:var(--green)}.t-neg{background:var(--redbg);color:var(--red)}.t-neu{background:var(--graybg);color:#888}
 
/* CONSENSUS TABLE */
.cons-tbl{width:100%;border-collapse:collapse;font-size:11px}
.cons-tbl th{font-size:9px;color:var(--tx2);text-align:right;padding:3px 6px 5px;border-bottom:1px solid var(--bd);letter-spacing:0.04em;font-weight:400}
.cons-tbl th:first-child{text-align:left}
.cons-tbl td{padding:5px 6px;border-bottom:1px solid var(--bd);text-align:right}
.cons-tbl td:first-child{text-align:left;color:var(--tx2)}
.cons-tbl tr:last-child td{border-bottom:none}
.cu{color:var(--green)}.cd{color:var(--red)}
 
/* PNL */
.pnl-wrap{height:120px;position:relative;margin-bottom:8px}
.pnl-label{font-size:10px;color:var(--tx2);text-align:center}
 
/* LEVEL BAR */
.lvl-bar{position:relative;height:24px;background:var(--bg3);border-radius:3px;margin-bottom:20px}
.lvl-marker{position:absolute;top:0;bottom:0;width:1px}
.lvl-marker-label{position:absolute;top:26px;font-size:9px;transform:translateX(-50%);white-space:nowrap}
 
/* CHART HEIGHT */
.ch-wrap{height:140px;position:relative;margin-top:10px}
 
/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
 
@media(max-width:900px){
  .detail-panel{position:relative;height:auto;border-top:1px solid var(--bd)}
  .main{grid-template-columns:1fr}
  .grid-panel{border-right:none}
}
</style>
</head>

// ============================================================
// STATE
// ============================================================
let selIdx = -1;
let filterMode = 'ALL';
let pnlChart = null;
let consChart = null;
 
// ============================================================
// CLOCK
// ============================================================
function updateClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR',{hour12:false});
}
setInterval(updateClock,1000);
updateClock();
 
function setSess(s){
  document.getElementById('sb-am').classList.toggle('active',s==='AM');
  document.getElementById('sb-pm').classList.toggle('active',s==='PM');
}
 
function setFilter(f){
  filterMode = f;
  document.querySelectorAll('.fb-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderGrid();
}
 
function refresh(){ renderGrid(); if(selIdx>=0) renderDetail(selIdx); }
 
// ============================================================
// SUMMARY STRIP
// ============================================================
function renderSummary(){
  const buyCount = STOCKS.filter(s=>s.signal==='buy').length;
  const watchCount = STOCKS.filter(s=>s.signal==='watch').length;
  const posStocks = STOCKS.filter(s=>s.pnl.entry&&s.price>s.pnl.entry);
  const avgPnl = STOCKS.filter(s=>s.pnl.entry).map(s=>((s.price-s.pnl.entry)/s.pnl.entry*100));
  const mean = avgPnl.length ? (avgPnl.reduce((a,b)=>a+b,0)/avgPnl.length).toFixed(1) : '-';
  const meanClass = parseFloat(mean)>=0?'g':'r';
  document.getElementById('summary-strip').innerHTML = `
    <div class="ss-item"><div class="ss-label">전체 종목</div><div class="ss-val">${STOCKS.length}</div></div>
    <div class="ss-item"><div class="ss-label">매수 신호</div><div class="ss-val g">${buyCount}</div></div>
    <div class="ss-item"><div class="ss-label">매수 추적</div><div class="ss-val a">${watchCount}</div></div>
    <div class="ss-item"><div class="ss-label">진입 종목</div><div class="ss-val">${STOCKS.filter(s=>s.pnl.entry).length}</div></div>
    <div class="ss-item"><div class="ss-label">평균 수익률</div><div class="ss-val ${meanClass}">${mean!=='-'?(parseFloat(mean)>=0?'+':'')+mean+'%':'-'}</div></div>
    <div class="ss-item"><div class="ss-label">수익 중</div><div class="ss-val g">${posStocks.length}종목</div></div>
  `;
}
 
// ============================================================
// GRID
// ============================================================
function sigClass(s){return s==='buy'?'sig-buy':s==='sell'?'sig-sell':s==='watch'?'sig-watch':'sig-hold';}
function badgeClass(s){return s==='buy'?'bg-buy':s==='sell'?'bg-sell':s==='watch'?'bg-watch':s==='hold'?'bg-hold':'bg-track';}
function pnlPct(st){if(!st.pnl.entry)return null;return((st.price-st.pnl.entry)/st.pnl.entry*100).toFixed(1);}
 
function renderGrid(){
  renderSummary();
  const grid = document.getElementById('stock-grid');
  const filtered = filterMode==='ALL'?STOCKS:STOCKS.filter(s=>s.signal===filterMode||(filterMode==='hold'&&(s.signal==='hold'||s.action==='관망'||s.action==='보유')));
  grid.innerHTML='';
  filtered.forEach((st,fi)=>{
    const i = STOCKS.indexOf(st);
    const pnl = pnlPct(st);
    const chgPos = st.change>=0;
    const pnlPos = pnl!==null&&parseFloat(pnl)>=0;
    const hasChart = st.pnl.prices&&st.pnl.prices.length>=2;
    const div = document.createElement('div');
    div.className = `sc ${sigClass(st.signal)}${selIdx===i?' sel':''}`;
    div.onclick = ()=>selectStock(i);
    div.innerHTML=`
      <div class="sc-top">
        <div class="sc-info"><div class="sc-code">${st.ticker} · ${st.sector}</div><div class="sc-name">${st.name}</div></div>
        <span class="sc-badge ${badgeClass(st.signal)}">${st.badge}</span>
      </div>
      <div class="sc-price-row">
        <span class="sc-price">${st.price.toLocaleString()}</span>
        <span class="sc-chg ${chgPos?'pos':'neg'}">${chgPos?'+':''}${st.change}%</span>
      </div>
      <div class="sc-bottom">
        <span class="sc-sector">CMF ${st.cmf>=0?'+':''}${st.cmf} · RSI ${st.rsi}</span>
        <span class="sc-pnl ${pnl===null?'na':pnlPos?'pos':'neg'}">${pnl===null?'—':(pnlPos?'+':'')+pnl+'%'}</span>
      </div>
      ${hasChart?`<canvas class="sc-spark" id="sp${i}" height="28"></canvas>`:`<div style="height:28px;margin-top:6px;display:flex;align-items:center;font-size:9px;color:var(--tx2);">진입 대기</div>`}
    `;
    grid.appendChild(div);
    if(hasChart){
      requestAnimationFrame(()=>{
        const c = document.getElementById('sp'+i);
        if(!c)return;
        const isUp = st.pnl.prices[st.pnl.prices.length-1]>=st.pnl.prices[0];
        new Chart(c,{type:'line',data:{labels:st.pnl.dates,datasets:[{data:st.pnl.prices,borderColor:isUp?'#1fa870':'#e04545',borderWidth:1.5,pointRadius:0,tension:0.4,fill:false}]},options:{responsive:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}});
      });
    }
  });
}
 
// ============================================================
// DETAIL
// ============================================================
function selectStock(i){
  selIdx=i;
  renderGrid();
  renderDetail(i);
  const dp = document.getElementById('detail-panel');
  dp.classList.remove('empty');
  dp.innerHTML = buildDetailHTML(STOCKS[i]);
  switchTab('overview');
}
 
function buildDetailHTML(st){
  return `<div class="dp-inner">
    <div class="dp-hdr">
      <button class="dp-close" onclick="closeDetail()">✕ 닫기</button>
      <div class="dp-title">${st.name}</div>
      <div class="dp-sub">${st.ticker} · ${st.sector}</div>
    </div>
    <div class="dp-tabs">
      <button class="dt active" onclick="switchTab('overview')">종합판단</button>
      <button class="dt" onclick="switchTab('indicators')">기술지표</button>
      <button class="dt" onclick="switchTab('consensus')">컨센서스</button>
      <button class="dt" onclick="switchTab('news')">뉴스</button>
      <button class="dt" onclick="switchTab('pnl')">수익추적</button>
    </div>
    <div class="dp-body">
      ${buildOverview(st)}
      ${buildIndicators(st)}
      ${buildConsensus(st)}
      ${buildNews(st)}
      ${buildPnl(st)}
    </div>
  </div>`;
}
 
function buildOverview(st){
  const pnl = pnlPct(st);
  const pnlPos = pnl!==null&&parseFloat(pnl)>=0;
  const ac = {매수:'buy',매도:'sell',관망:'watch',보유:'hold',매수추적:'watch',분할매수:'buy',손절:'sell',익절:'hold'}[st.action]||'hold';
  const pnlDisp = pnl!==null?` <span style="color:${pnlPos?'var(--green)':'var(--red)'};">(${pnlPos?'+':''}${pnl}%)</span>`:'';
  const allL = [...st.support,...st.resist,st.price];
  const minL=Math.min(...allL)*0.97,maxL=Math.max(...allL)*1.03;
  const pct=v=>((v-minL)/(maxL-minL)*100).toFixed(1);
  const supMarkers = st.support.map(v=>`<div class="lvl-marker" style="left:${pct(v)}%;background:var(--red);opacity:0.8;"></div><div class="lvl-marker-label" style="left:${pct(v)}%;color:var(--red);">${(v/1000).toFixed(0)}K</div>`).join('');
  const resMarkers = st.resist.map(v=>`<div class="lvl-marker" style="left:${pct(v)}%;background:var(--green);opacity:0.8;"></div><div class="lvl-marker-label" style="left:${pct(v)}%;color:var(--green);">${(v/1000).toFixed(0)}K</div>`).join('');
  const nowMarker = `<div class="lvl-marker" style="left:${pct(st.price)}%;background:var(--blue);width:2px;z-index:2;"></div><div style="position:absolute;left:${pct(st.price)}%;top:-16px;font-size:9px;color:var(--blue);transform:translateX(-50%);font-weight:700;">현재</div>`;
  const stopLoss = st.pnl.entry ? Math.round(st.pnl.entry-2*st.atr).toLocaleString() : st.support[st.support.length-1].toLocaleString();
  return `<div id="tab-overview" class="dp-tab-content">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;">
      <div style="font-size:20px;font-weight:700;">${st.price.toLocaleString()}<span style="font-size:12px;color:${st.change>=0?'var(--green)':'var(--red)'};margin-left:6px;">${st.change>=0?'+':''}${st.change}%</span></div>
      <div style="font-size:11px;color:var(--tx2);">ATR ${st.atr.toLocaleString()} · ADX ${st.adx}</div>
    </div>
    <div class="dp-metrics">${st.metrics.map(m=>`<div class="dm"><div class="dm-l">${m.l}</div><div class="dm-v">${m.v}</div>${m.s?`<div class="dm-s">${m.s}</div>`:''}</div>`).join('')}</div>
    <div class="verdict-box">
      <div class="dps-label">최종 트레이딩 판단</div>
      <div class="vb-action ${ac}">${st.action}${pnlDisp}</div>
      <div class="vb-reason">${st.verdict}</div>
      <div class="vb-levels">
        <div class="vbl"><span class="vbl-l">손절:</span><span class="vbl-v r">${stopLoss}원</span></div>
        <div class="vbl"><span class="vbl-l">1차저항:</span><span class="vbl-v g">${st.resist[0].toLocaleString()}원</span></div>
        <div class="vbl"><span class="vbl-l">기준선:</span><span class="vbl-v">${st.kijun.toLocaleString()}원</span></div>
      </div>
    </div>
    <div class="dps-label">지지/저항 레벨</div>
    <div class="lvl-bar" style="margin-bottom:28px;">${supMarkers}${resMarkers}${nowMarker}</div>
  </div>`;
}
 
function buildIndicators(st){
  const rows = st.indicators.map(ind=>{
    const bc = ind.sig==='bull'?'bf-g':ind.sig==='bear'?'bf-r':'bf-n';
    return `<tr><td style="font-weight:600;font-size:11px;">${ind.n}</td><td>${ind.v}</td><td><span class="bar-w"><span class="bar-f ${bc}" style="width:${ind.sc}%;"></span></span></td><td style="color:var(--tx1);font-size:10px;">${ind.d}</td></tr>`;
  }).join('');
  return `<div id="tab-indicators" class="dp-tab-content" style="display:none;">
    <div class="dps-label" style="margin-top:4px;">기술적 지표 상세</div>
    <table class="ind-tbl"><tr><th>지표</th><th>현재값</th><th>강도</th><th>해설</th></tr>${rows}</table>
  </div>`;
}
 
function buildConsensus(st){
  const rows = st.consensus.map((r,ri)=>{
    const eu=r.e.includes('+'),ed=r.e.includes('-');
    return `<tr ${ri===0?'style="opacity:0.6;"':''}><td>${r.y}</td><td>${r.s}</td><td>${r.o}</td><td class="${eu?'cu':ed?'cd':''}">${r.e}</td></tr>`;
  }).join('');
  return `<div id="tab-consensus" class="dp-tab-content" style="display:none;">
    <div class="dps-label" style="margin-top:4px;">실적 컨센서스 변동</div>
    <table class="cons-tbl"><tr><th>연도</th><th>매출</th><th>영업이익</th><th>EPS변동</th></tr>${rows}</table>
    <div class="ch-wrap"><canvas id="cons-chart"></canvas></div>
  </div>`;
}
 
function buildNews(st){
  const items = st.news.map(n=>`<div class="news-item"><div class="ni-date">${n.d}</div><div class="ni-title">${n.t}</div><span class="ni-tag ${n.imp==='pos'?'t-pos':n.imp==='neg'?'t-neg':'t-neu'}">${n.imp==='pos'?'긍정':n.imp==='neg'?'부정':'중립'}</span></div>`).join('');
  return `<div id="tab-news" class="dp-tab-content" style="display:none;"><div class="dps-label" style="margin-top:4px;">최근 주요 뉴스</div>${items}</div>`;
}
 
function buildPnl(st){
  const pnl = pnlPct(st);
  const pnlPos = pnl!==null&&parseFloat(pnl)>=0;
  const entryInfo = st.pnl.entry?`매수일 ${st.entryDate} @ ${st.pnl.entry.toLocaleString()}원 | 현재 ${pnlPos?'+':''}${pnl}%`:'매수 진입 대기 — 진입 신호 발생 시 추적 시작';
  return `<div id="tab-pnl" class="dp-tab-content" style="display:none;">
    <div class="dps-label" style="margin-top:4px;">매수 진입 이후 수익률</div>
    <div class="pnl-wrap"><canvas id="pnl-chart"></canvas></div>
    <div class="pnl-label">${entryInfo}</div>
  </div>`;
}
 
function switchTab(tab){
  document.querySelectorAll('.dp-tab-content').forEach(c=>c.style.display='none');
  const el = document.getElementById('tab-'+tab);
  if(el) el.style.display='block';
  document.querySelectorAll('.dt').forEach((t,i)=>{
    const tabs=['overview','indicators','consensus','news','pnl'];
    t.classList.toggle('active',tabs[i]===tab);
  });
  if(tab==='consensus') renderConsChart();
  if(tab==='pnl') renderPnlChartFn();
}
 
function renderConsChart(){
  if(selIdx<0)return;
  const st=STOCKS[selIdx];
  const el=document.getElementById('cons-chart');
  if(!el)return;
  if(consChart)consChart.destroy();
  consChart=new Chart(el,{
    type:'bar',
    data:{labels:st.epsChart.l,datasets:[{label:'영업이익(조)',data:st.epsChart.v,backgroundColor:st.epsChart.v.map(v=>v>=0?'rgba(31,168,112,0.7)':'rgba(224,69,69,0.7)'),borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6a6864',font:{size:10}}},y:{ticks:{color:'#6a6864',font:{size:10},callback:v=>v+'조'}}}}
  });
}
 
function renderPnlChartFn(){
  if(selIdx<0)return;
  const st=STOCKS[selIdx];
  const el=document.getElementById('pnl-chart');
  if(!el)return;
  if(pnlChart)pnlChart.destroy();
  if(!st.pnl.entry||!st.pnl.prices.length){return;}
  const pcts=st.pnl.prices.map(p=>parseFloat(((p-st.pnl.entry)/st.pnl.entry*100).toFixed(2)));
  const last=pcts[pcts.length-1];
  const col=last>=0?'#1fa870':'#e04545';
  pnlChart=new Chart(el,{
    type:'line',
    data:{labels:st.pnl.dates,datasets:[
      {data:pcts,borderColor:col,borderWidth:2,backgroundColor:last>=0?'rgba(31,168,112,0.08)':'rgba(224,69,69,0.08)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:col},
      {data:st.pnl.dates.map(()=>0),borderColor:'rgba(100,100,100,0.3)',borderWidth:1,borderDash:[3,3],pointRadius:0}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y>0?'+':''}${c.parsed.y.toFixed(2)}%`}}},scales:{x:{ticks:{color:'#6a6864',font:{size:9}}},y:{ticks:{color:'#6a6864',font:{size:9},callback:v=>v+'%'}}}}
  });
}
 
function closeDetail(){
  selIdx=-1;
  renderGrid();
  const dp=document.getElementById('detail-panel');
  dp.classList.add('empty');
  dp.innerHTML='<div class="dp-placeholder">종목을 클릭하면<br>상세 분석이 표시됩니다</div>';
}
 
function renderDetail(i){ /* called after buildDetailHTML */ }
 
// INIT
renderGrid();
</script>
</body>
</html>
